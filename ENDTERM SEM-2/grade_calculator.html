<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks & Grade Calculator</title>
    <style>
        body {
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #marksInputsContainer {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background-color: #e9ecef;
            display: none;
        }
        .result-item {
            margin: 8px 0;
            font-size: 16px;
            color: #333;
        }
        .pass {
            color: #28a745;
            font-weight: bold;
        }
        .fail {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Grade Calculator</h2>
    <div class="form-group">
        <label for="numSubjects">Enter Number of Subjects:</label>
        <input type="number" id="numSubjects" min="1" placeholder="e.g., 5">
        <button onclick="generateSubjectInputs()">Generate Mark Fields</button>
    </div>
    <div id="marksInputsContainer"></div>
    <button id="calculateBtn" style="display: none;" onclick="calculateResults()">Calculate Grade</button>
    <div id="result" class="result-box">
        <div class="result-item"><strong>Total Marks:</strong> <span id="resTotal"></span></div>
        <div class="result-item"><strong>Percentage / Average:</strong> <span id="resAverage"></span>%</div>
        <div class="result-item"><strong>Grade:</strong> <span id="resGrade"></span></div>
        <div class="result-item"><strong>Status:</strong> <span id="resStatus"></span></div>
    </div>
</div>
<script>
    function generateSubjectInputs() {
        const numSubjects = parseInt(document.getElementById('numSubjects').value);
        const container = document.getElementById('marksInputsContainer');
        const calculateBtn = document.getElementById('calculateBtn');
        const resultBox = document.getElementById('result');
        container.innerHTML = '';
        resultBox.style.display = 'none';
        
        if (isNaN(numSubjects) || numSubjects <= 0) {
            alert('Please enter a valid number of subjects greater than 0.');
            return;
        }

        for (let i = 1; i <= numSubjects; i++) {
            const div = document.createElement('div');
            div.className = 'form-group';
            div.innerHTML = `
                <label for="subject${i}">Marks for Subject ${i}:</label>
                <input type="number" id="subject${i}" class="subject-mark" min="0" max="100" placeholder="Enter marks (0-100)">
            `;
            container.appendChild(div);
        }
        
        calculateBtn.style.display = 'block';
    }

    function calculateResults() {
        const markInputs = document.querySelectorAll('.subject-mark');
        let total = 0;
        let count = markInputs.length;
        let hasInvalidInput = false;

        for (let i = 0; i < count; i++) {
            let mark = parseFloat(markInputs[i].value);
            
            if (isNaN(mark) || mark < 0 || mark > 100) {
                hasInvalidInput = true;
                break;
            }
            total += mark;
        }

        if (hasInvalidInput) {
            alert('Please enter valid marks between 0 and 100 for all fields.');
            return;
        }

        let average = total / count;
        let grade = '';
        let status = '';

        if (average >= 90) {
            grade = 'A+';
        } else if (average >= 80) {
            grade = 'A';
        } else if (average >= 70) {
            grade = 'B';
        } else if (average >= 60) {
            grade = 'C';
        } else if (average >= 50) {
            grade = 'D';
        } else {
            grade = 'F';
        }

        if (average >= 50) {
            status = '<span class="pass">PASSED</span>';
        } else {
            status = '<span class="fail">FAILED</span>';
        }

        document.getElementById('resTotal').innerText = total;
        document.getElementById('resAverage').innerText = average.toFixed(2);
        document.getElementById('resGrade').innerText = grade;
        document.getElementById('resStatus').innerHTML = status;
        
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
